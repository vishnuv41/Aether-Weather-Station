<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="860" height="480" fill="#ffffff"/>

  <!-- 1. Sensors -->
  <rect x="190" y="20" width="220" height="56" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="300" y="54" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1b4b">Environmental Sensors</text>

  <line x1="300" y1="76" x2="300" y2="116" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- 2. ESP32 -->
  <rect x="210" y="118" width="180" height="56" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="300" y="152" text-anchor="middle" font-size="16" font-weight="600" fill="#083344">ESP32</text>

  <line x1="300" y1="174" x2="300" y2="222" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="316" y="202" font-size="12.5" fill="#64748b" font-style="italic">Embedded HTTP Server</text>

  <!-- 3. React dashboard -->
  <rect x="160" y="224" width="280" height="56" rx="10" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="300" y="258" text-anchor="middle" font-size="16" font-weight="600" fill="#701a75">React Dashboard</text>

  <line x1="300" y1="280" x2="300" y2="320" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- 4. User browser -->
  <rect x="180" y="322" width="240" height="56" rx="10" fill="#fafafa" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="300" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#18181b">User Browser</text>

  <!-- no internet badge -->
  <rect x="560" y="220" width="220" height="44" rx="22" fill="#fef9c3" stroke="#a16207" stroke-width="1.5"/>
  <text x="670" y="247" text-anchor="middle" font-size="13" font-weight="600" fill="#713f12">No internet required</text>
  <line x1="560" y1="242" x2="440" y2="250" stroke="#a16207" stroke-width="1.3" stroke-dasharray="4,3"/>

  <text x="300" y="440" text-anchor="middle" font-size="13" fill="#9ca3af">Aether Weather Station — Local Mode Data Flow</text>
</svg>
